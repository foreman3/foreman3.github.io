<svg xmlns="http://www.w3.org/2000/svg" width="980" height="1120" viewBox="0 0 980 1120">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f1830"/>
      <stop offset="55%" stop-color="#0b1122"/>
      <stop offset="100%" stop-color="#060911"/>
    </linearGradient>
    <linearGradient id="frame" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4bf4ff"/>
      <stop offset="45%" stop-color="#356cff"/>
      <stop offset="100%" stop-color="#ff6db9"/>
    </linearGradient>
    <linearGradient id="metal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d9e6ff"/>
      <stop offset="50%" stop-color="#7e8fb8"/>
      <stop offset="100%" stop-color="#394865"/>
    </linearGradient>
    <linearGradient id="apron" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2438"/>
      <stop offset="100%" stop-color="#0b111d"/>
    </linearGradient>
    <radialGradient id="reactorGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#9fffff" stop-opacity="0.95"/>
      <stop offset="35%" stop-color="#34ddff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#34ddff" stop-opacity="0"/>
