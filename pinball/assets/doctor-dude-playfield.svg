    <linearGradient id="laneCenter" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#baff8f"/>
      <stop offset="100%" stop-color="#58d17b"/>
    </linearGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
